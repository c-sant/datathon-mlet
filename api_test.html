<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Teste API RAG</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    textarea, input { width: 100%; box-sizing: border-box; margin: 4px 0 12px; }
    button { padding: 10px 16px; font-size: 16px; }
    .section { margin-bottom: 28px; }
    .result { white-space: pre-wrap; background: #f3f3f3; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Teste API RAG</h1>
  <p>Certifique-se de que o servidor está rodando em <code>http://127.0.0.1:8000</code>.</p>

  <div class="section">
    <h2>1. Ingestão de Documento</h2>
    <label for="ingestBody">Payload JSON</label>
    <textarea id="ingestBody" rows="8">{
  "docs": [
    {
      "id": "web_test_1",
      "title": "Teste API Web",
      "text": "Mercado financeiro em 2026 deve priorizar renda fixa e ações de dividendos."
    }
  ],
  "overwrite": true
}</textarea>
    <button id="ingestBtn">Enviar /ingest</button>
    <div id="ingestResult" class="result"></div>
  </div>

  <div class="section">
    <h2>2. Consulta</h2>
    <label for="queryText">Consulta (q)</label>
    <input id="queryText" type="text" value="Quais ações são recomendadas para 2026?" />
    <label for="topK">top_k</label>
    <input id="topK" type="number" value="3" min="1" max="10" />
    <button id="queryBtn">Enviar /query</button>
    <div id="queryResult" class="result"></div>
  </div>

  <script>
    const baseUrl = 'http://127.0.0.1:8000';

    document.getElementById('ingestBtn').addEventListener('click', async () => {
      const body = document.getElementById('ingestBody').value;
      try {
        const resp = await fetch(`${baseUrl}/ingest`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body,
        });
        const json = await resp.json();
        document.getElementById('ingestResult').textContent = `${resp.status} \n${JSON.stringify(json, null, 2)}`;
      } catch (error) {
        document.getElementById('ingestResult').textContent = error;
      }
    });

    document.getElementById('queryBtn').addEventListener('click', async () => {
      const q = encodeURIComponent(document.getElementById('queryText').value);
      const topK = document.getElementById('topK').value;
      try {
        const resp = await fetch(`${baseUrl}/query?q=${q}&top_k=${topK}`);
        const json = await resp.json();
        document.getElementById('queryResult').textContent = `${resp.status} \n${JSON.stringify(json, null, 2)}`;
      } catch (error) {
        document.getElementById('queryResult').textContent = error;
      }
    });
  </script>
</body>
</html>
