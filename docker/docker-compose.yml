services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: mlet-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - bentoml

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    ports:
      - "8001:8000"
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model facebook/opt-125m
      --host 0.0.0.0
      --port 8000

  bentoml:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bento
    container_name: bentoml-server
    ports:
      - "8002:3000"
    volumes:
      - ../generator/serving:/generator/serving
    depends_on:
      - vllm