#    container_name: api
#    ports:
#      - "8000:8000"
##    depends_on:
##      - bentoml
##      - vllm

  bentoml:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bento
    container_name: bentoml
    ports:
      - "3000:3000"
    depends_on:
      vllm:
        condition: service_healthy
