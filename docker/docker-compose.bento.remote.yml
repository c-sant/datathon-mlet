services:
  bentoml_remote:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bento
    container_name: bentoml_remote
    ports:
      - "3004:3000"
    environment:
      VLLM_BASE_URL: ${VLLM_BASE_URL}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct-AWQ}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
    restart: unless-stopped
