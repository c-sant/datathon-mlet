services:
  api:
    build: .
    container_name: mlet-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mlflow

  mlflow:
    image: python:3.10-slim
    container_name: mlflow-server
    working_dir: /app
  volumes:
    - ./mlruns:/mlruns
    - ./mlflow.db:/mlflow.db
  ports:
    - "5000:5000"
  command: >
    sh -c "pip install mlflow && 
           mlflow server 
           --backend-store-uri sqlite:///mlflow.db 
           --default-artifact-root /mlruns 
           --host 0.0.0.0 
           --port 5000"